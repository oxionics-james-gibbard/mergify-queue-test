# Mergify Merge Queue Test Configuration
# Scopes temporarily removed to test basic queue flow.
# Re-add scopes after confirming plan tier with Mergify.

queue_rules:
  - name: default
    queue_conditions:
      - check-success = "Check status"
      - -label = do-not-merge
      - -draft
    merge_conditions:
      - check-success = "Check status"
    merge_method: squash
    batch_size: 1
    checks_timeout: 30 min

priority_rules:
  - name: light-changes
    conditions:
      - or:
          - files ~= ^docs/
          - files ~= ^systems/
          - files ~= ^tooling/
          - files ~= ^\.claude/
    priority: high
    allow_checks_interruption: true

pull_request_rules:
  - name: auto-queue on CI pass
    conditions:
      - check-success = "Check status"
      - -label = do-not-merge
      - -draft
    actions:
      queue:
