name: Check

on:
  pull_request:
  merge_group:

jobs:
  detect-scope:
    name: Detect scope
    runs-on: ubuntu-latest
    outputs:
      scope: ${{ steps.detect.outputs.scope }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect scope from changed files
        id: detect
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            BASE="origin/$GITHUB_BASE_REF"
          else
            BASE="${GITHUB_SHA}^"
          fi

          CHANGED=$(git diff --name-only "$BASE" HEAD 2>/dev/null || echo "")
          echo "Changed files:"
          echo "$CHANGED"

          SCOPE="light"

          if echo "$CHANGED" | grep -qE '^(projects/liboi/|projects/ion-transport/|projects/hw-description/|projects/protos/|projects/artiq-extensions/|projects/sirocco/|projects/nano-vna/|third-party/|projects/ion-experiments2/|projects/lab-experiments/|projects/cryo-experiments/)'; then
            SCOPE="core"
          elif echo "$CHANGED" | grep -qE '^(projects/orchestrator/|projects/orchestrator_client/|projects/service-|projects/controllers/|projects/orchestrator-dashboard/|projects/dashboard/|projects/hw-status-service|projects/ionics-worker/|projects/oi-trace-utils/)'; then
            SCOPE="standard"
          fi

          echo "Detected scope: $SCOPE"
          echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"

  static-validation:
    name: Static validation
    runs-on: ubuntu-latest
    steps:
      - name: Run linting and formatting checks
        run: |
          echo "Running static validation..."
          sleep 30
          echo "Static validation passed"

  fast-tests:
    name: Fast tests
    runs-on: ubuntu-latest
    needs: [detect-scope, static-validation]
    steps:
      - name: Run unit tests
        run: |
          echo "Scope: ${{ needs.detect-scope.outputs.scope }}"
          echo "Running fast tests (unit tests, type checks)..."
          sleep 60
          echo "Fast tests passed"

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [detect-scope, fast-tests]
    if: >-
      needs.detect-scope.outputs.scope == 'core'
      || needs.detect-scope.outputs.scope == 'standard'
    steps:
      - name: Run integration tests
        run: |
          echo "Scope: ${{ needs.detect-scope.outputs.scope }}"
          echo "Running integration tests (Docker, orchestrator, E2E)..."
          sleep 180
          echo "Integration tests passed"

  hitl-tests:
    name: "HITL (${{ matrix.system }})"
    runs-on: ubuntu-latest
    needs: [detect-scope, fast-tests]
    if: needs.detect-scope.outputs.scope == 'core'
    strategy:
      fail-fast: false
      matrix:
        system: [blue-barrel, quartet]
    steps:
      - name: Run HITL tests on ${{ matrix.system }}
        run: |
          echo "Scope: ${{ needs.detect-scope.outputs.scope }}"
          echo "Running HITL tests on ${{ matrix.system }} hardware..."
          echo "(Real duration: 44-81 min, simulated: 5 min)"
          sleep 300
          echo "HITL tests passed for ${{ matrix.system }}"

  ci-gate:
    name: Check status
    if: ${{ !cancelled() }}
    needs:
      - static-validation
      - detect-scope
      - fast-tests
      - integration-tests
      - hitl-tests
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs passed
        run: |
          echo "static-validation: ${{ needs.static-validation.result }}"
          echo "fast-tests: ${{ needs.fast-tests.result }}"
          echo "integration-tests: ${{ needs.integration-tests.result }}"
          echo "hitl-tests: ${{ needs.hitl-tests.result }}"

          for result in \
            "${{ needs.static-validation.result }}" \
            "${{ needs.fast-tests.result }}" \
            "${{ needs.integration-tests.result }}" \
            "${{ needs.hitl-tests.result }}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "FAILED: a required job did not succeed (got: $result)"
              exit 1
            fi
          done

          echo "All required jobs passed or were skipped"
