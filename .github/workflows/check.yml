name: Check

on:
  pull_request:
  merge_group:

jobs:
  detect-and-upload-scopes:
    name: Detect scopes
    runs-on: ubuntu-latest
    outputs:
      scope: ${{ steps.detect.outputs.scope }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect scope from changed files
        id: detect
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            CHANGED=$(git diff --name-only "origin/$GITHUB_BASE_REF" HEAD)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          fi
          echo "Changed files:"
          echo "$CHANGED"

          SCOPES=""

          if echo "$CHANGED" | grep -qE '^(projects/liboi/|projects/ion-transport/|projects/hw-description/|projects/protos/|projects/artiq-extensions/|projects/sirocco/|projects/nano-vna/|third-party/|projects/ion-experiments2/|projects/lab-experiments/|projects/cryo-experiments/)'; then
            SCOPES="${SCOPES:+$SCOPES,}core"
          fi

          if echo "$CHANGED" | grep -qE '^(projects/orchestrator/|projects/orchestrator_client/|projects/service-|projects/controllers/|projects/orchestrator-dashboard/|projects/dashboard/|projects/hw-status-service|projects/ionics-worker/|projects/oi-trace-utils/)'; then
            SCOPES="${SCOPES:+$SCOPES,}standard"
          fi

          if echo "$CHANGED" | grep -qE '^(systems/|docs/|tooling/|\.claude/|projects/analysis/|projects/ionics-fits/|projects/trap-designs/|projects/oi-rust-build/|projects/systems-tooling/|projects/test-runners/)'; then
            SCOPES="${SCOPES:+$SCOPES,}light"
          fi

          if [ -z "$SCOPES" ]; then
            SCOPES="light"
          fi

          echo "Detected scopes: $SCOPES"
          echo "scopes=$SCOPES" >> "$GITHUB_OUTPUT"

          # Determine highest scope for conditional job execution
          if echo "$SCOPES" | grep -q "core"; then
            echo "scope=core" >> "$GITHUB_OUTPUT"
          elif echo "$SCOPES" | grep -q "standard"; then
            echo "scope=standard" >> "$GITHUB_OUTPUT"
          else
            echo "scope=light" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Mergify CLI
        run: pip install mergify-cli

      - name: Upload scopes to Mergify
        env:
          MERGIFY_TOKEN: ${{ secrets.MERGIFY_TOKEN }}
        run: |
          IFS=',' read -ra SCOPE_LIST <<< "${{ steps.detect.outputs.scopes }}"
          ARGS=""
          for s in "${SCOPE_LIST[@]}"; do
            ARGS="$ARGS --scope $s"
          done
          echo "Uploading scopes: $ARGS"
          mergify ci scopes-send $ARGS

  static-validation:
    name: Static validation
    runs-on: ubuntu-latest
    steps:
      - name: Run linting and formatting checks
        run: |
          echo "Running static validation..."
          sleep 30
          echo "Static validation passed"

  fast-tests:
    name: Fast tests
    runs-on: ubuntu-latest
    needs: [detect-and-upload-scopes, static-validation]
    steps:
      - name: Run unit tests
        run: |
          echo "Scope: ${{ needs.detect-and-upload-scopes.outputs.scope }}"
          echo "Running fast tests (unit tests, type checks)..."
          sleep 60
          echo "Fast tests passed"

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [detect-and-upload-scopes, fast-tests]
    if: >-
      needs.detect-and-upload-scopes.outputs.scope == 'core'
      || needs.detect-and-upload-scopes.outputs.scope == 'standard'
    steps:
      - name: Run integration tests
        run: |
          echo "Scope: ${{ needs.detect-and-upload-scopes.outputs.scope }}"
          echo "Running integration tests (Docker, orchestrator, E2E)..."
          sleep 180
          echo "Integration tests passed"

  hitl-tests:
    name: "HITL (${{ matrix.system }})"
    runs-on: ubuntu-latest
    needs: [detect-and-upload-scopes, fast-tests]
    if: needs.detect-and-upload-scopes.outputs.scope == 'core'
    strategy:
      fail-fast: false
      matrix:
        system: [blue-barrel, quartet]
    steps:
      - name: Run HITL tests on ${{ matrix.system }}
        run: |
          echo "Scope: ${{ needs.detect-and-upload-scopes.outputs.scope }}"
          echo "Running HITL tests on ${{ matrix.system }} hardware..."
          echo "(Real duration: 44-81 min, simulated: 5 min)"
          sleep 300
          echo "HITL tests passed for ${{ matrix.system }}"

  ci-gate:
    name: Check status
    if: ${{ !cancelled() }}
    needs:
      - static-validation
      - detect-and-upload-scopes
      - fast-tests
      - integration-tests
      - hitl-tests
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs passed
        run: |
          echo "static-validation: ${{ needs.static-validation.result }}"
          echo "fast-tests: ${{ needs.fast-tests.result }}"
          echo "integration-tests: ${{ needs.integration-tests.result }}"
          echo "hitl-tests: ${{ needs.hitl-tests.result }}"

          for result in \
            "${{ needs.static-validation.result }}" \
            "${{ needs.fast-tests.result }}" \
            "${{ needs.integration-tests.result }}" \
            "${{ needs.hitl-tests.result }}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "FAILED: a required job did not succeed (got: $result)"
              exit 1
            fi
          done

          echo "All required jobs passed or were skipped"
